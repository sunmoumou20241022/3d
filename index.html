<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>寻宝洛阳 - 终极完整版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { font-family: '楷体', 'STKaiti', serif; margin: 0; overflow: hidden; }
      #ui { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 10; color: #fff; text-align: center; width: 90%; pointer-events: none; }
      .msg-box { background: rgba(15, 8, 3, 0.9); padding: 15px 25px; border-radius: 8px; display: none; font-size: 20px; border: 1px solid #d4af37; box-shadow: 0 0 15px #d4af37;}
      
      .puzzle-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
      .puzzle-board { border-radius: 10px; padding: 30px; text-align: center; max-width: 85%; position: relative; }
      .puzzle-title { font-size: 26px; margin-bottom: 15px; font-weight: bold; padding-bottom: 10px; letter-spacing: 2px;}
      .poem-text { font-size: 24px; text-align: center; margin: 20px 0; letter-spacing: 2px; font-weight: bold; line-height: 1.4;}
      .poem-desc { font-size: 18px; margin-bottom: 25px; line-height: 1.5;}
      .option-btn { display: block; width: 100%; padding: 15px; font-size: 20px; font-family: '楷体'; border-radius: 5px; cursor: pointer; margin-bottom: 15px; transition: all 0.1s; }
      .option-btn:active { transform: scale(0.98); }
      .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }

      /* 第一关：暗黑石门 */
      #board-1 { background: #2c1e16; border: 3px solid #d4af37; box-shadow: 0 0 50px #000; }
      #board-1 .puzzle-title { color: #d4af37; border-bottom: 1px solid #d4af37; }
      #board-1 .poem-desc { color: #eeddcc; }
      #board-1 .poem-text { color: #fff; }
      #board-1 .option-btn { background: linear-gradient(180deg, #4a2e1b 0%, #2a1609 100%); color: #eeddcc; border: 1px solid #d4af37; }
      #board-1 .option-btn:hover { background: #d4af37; color: #000; }
      #board-1 .close-btn { color: #d4af37; }

      /* 第二关：丝帛古卷 */
      #board-2 { background: #e8dcc7; border: 3px solid #8b4513; box-shadow: 0 0 50px rgba(139,69,19,0.5); }
      #board-2 .puzzle-title { color: #8b4513; border-bottom: 2px solid #8b4513; }
      #board-2 .poem-desc { color: #333; font-weight: bold; }
      #board-2 .poem-text { color: #800000; }
      #board-2 .option-btn { background: #f4ead5; color: #5c3a21; border: 1px solid #8b4513; font-weight: bold; }
      #board-2 .option-btn:hover { background: #d4af37; color: #fff; }
      #board-2 .close-btn { color: #8b4513; }

      /* 第三关：青铜机械 */
      #board-3 { background: #1a252c; border: 3px solid #5f9ea0; box-shadow: 0 0 50px rgba(95,158,160,0.5); }
      #board-3 .puzzle-title { color: #5f9ea0; border-bottom: 2px solid #5f9ea0; }
      #board-3 .poem-desc { color: #a0b8b8; }
      #board-3 .poem-text { color: #e0ffff; }
      #board-3 .option-btn { background: #2f4f4f; color: #e0ffff; border: 1px solid #5f9ea0; }
      #board-3 .option-btn:hover { background: #5f9ea0; color: #fff; }
      #board-3 .close-btn { color: #5f9ea0; }

      #transition-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .transition-text { color: #d4af37; font-size: 24px; letter-spacing: 5px; opacity: 0; transition: opacity 1s ease-in-out; text-shadow: 0 0 10px #d4af37;}
      #compass { position: absolute; bottom: 30px; left: 30px; z-index: 10; color: #d4af37; font-size: 16px; width: 60px; height: 60px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
    </style>
  </head>
  <body>
    
    <div id="ui"><div id="msg" class="msg-box"></div></div>
    <div id="transition-screen"><div id="trans-text" class="transition-text"></div></div>
    <div id="compass">寻龙点穴</div>

    <!-- 第一关：石门 -->
    <div id="puzzle-1" class="puzzle-overlay">
      <div id="board-1" class="puzzle-board">
        <div class="close-btn" onclick="closePuzzle(1)">✖</div>
        <div class="puzzle-title">龙纹石门机关</div>
        <div class="poem-desc">你在暗道尽头的石壁上发现了一个凹槽，须对出暗号：</div>
        <div class="poem-text">“洛阳亲友如相问，<br>_____________。”</div>
        <button class="option-btn" onclick="checkAnswer1('wrong')">A. 不及汪伦送我情</button>
        <button class="option-btn" onclick="checkAnswer1('correct')">B. 一片冰心在玉壶</button>
        <button class="option-btn" onclick="checkAnswer1('wrong')">C. 孤帆远影碧空尽</button>
        <button class="option-btn" onclick="checkAnswer1('wrong')">D. 天涯若比邻</button>
      </div>
    </div>

    <!-- 第二关：藏经卷轴 -->
    <div id="puzzle-2" class="puzzle-overlay">
      <div id="board-2" class="puzzle-board">
        <div class="close-btn" onclick="closePuzzle(2)">✖</div>
        <div class="puzzle-title">西域商路密卷</div>
        <div class="poem-desc">书架深处的丝帛写着大唐西域商会的机密口令，唯有对出方可开启密道：</div>
        <div class="poem-text">“劝君更尽一杯酒，<br>西出____无故人。”</div>
        <button class="option-btn" onclick="checkAnswer2('wrong')">A. 雁门</button>
        <button class="option-btn" onclick="checkAnswer2('correct')">B. 阳关</button>
        <button class="option-btn" onclick="checkAnswer2('wrong')">C. 玉门</button>
        <button class="option-btn" onclick="checkAnswer2('wrong')">D. 楼兰</button>
      </div>
    </div>

    <!-- 第三关：青铜八卦 -->
    <div id="puzzle-3" class="puzzle-overlay">
      <div id="board-3" class="puzzle-board">
        <div class="close-btn" onclick="closePuzzle(3)">✖</div>
        <div class="puzzle-title">青铜八卦锁</div>
        <div class="poem-desc">巨大的青铜齿轮卡死，若要齿轮倒转开启佛窟，需破解天干之谜：</div>
        <div class="poem-text">“天干地支中，‘甲’对应的五行是？”</div>
        <button class="option-btn" onclick="checkAnswer3('wrong')">A. 金</button>
        <button class="option-btn" onclick="checkAnswer3('correct')">B. 木</button>
        <button class="option-btn" onclick="checkAnswer3('wrong')">C. 水</button>
        <button class="option-btn" onclick="checkAnswer3('wrong')">D. 火</button>
      </div>
    </div>

    <!-- 3D 场景 -->
    <a-scene renderer="colorManagement: true; antialias: true;">
      <a-sky id="main-sky" src="room1.jpg" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls="pointerLockEnabled: false;">
        <a-cursor cursor="rayOrigin: mouse" raycaster="objects: .interactive" color="#fff" radius-inner="0.01" radius-outer="0.02"></a-cursor>
      </a-entity>
      
      <!-- 第一关热区 -->
      <a-circle id="hotspot-1" class="interactive" position="-1 -0.5 -4.8" radius="1.5" opacity="0" onclick="openPuzzle(1)"></a-circle>

      <!-- 第二关热区 -->
      <a-entity id="hotspot-2" position="3 0 -2" visible="false">
         <a-circle class="interactive" radius="1.5" opacity="0" onclick="openPuzzle(2)"></a-circle>
         <a-sphere radius="0.08" color="#FFD700" material="emissive: #FFD700; emissiveIntensity: 0.6" opacity="0.6" animation="property: opacity; to: 0.1; dir: alternate; loop: true; dur: 1500"></a-sphere>
      </a-entity>

      <!-- 第三关热区：缩小透明热区避免事件穿透，降低发光刺眼度 -->
      <a-entity id="hotspot-3" position="-1.5 0 -3" visible="false">
         <a-circle class="interactive" radius="1.2" opacity="0" onclick="openPuzzle(3)"></a-circle>
         <a-sphere radius="0.08" color="#005555" material="emissive: #005555; emissiveIntensity: 0.3" opacity="0.5" animation="property: opacity; to: 0.1; dir: alternate; loop: true; dur: 2000"></a-sphere>
      </a-entity>

    </a-scene>

    <script>
      // 引入全局状态锁，防御射线事件穿透导致跳关
      let currentLevel = 1;

      function openPuzzle(num) { 
        // 状态锁校验，拒绝越权调用
        if (num !== currentLevel) return;
        document.getElementById('puzzle-' + num).style.display = 'flex'; 
      }
      function closePuzzle(num) { document.getElementById('puzzle-' + num).style.display = 'none'; }

      function checkAnswer1(result) {
        if (result === 'correct') {
          closePuzzle(1);
          startTransition('机关轰鸣，天旋地转...', 'room2.jpg', 'hotspot-1', 'hotspot-2', '轰隆隆...\n石壁裂开，你进入了【胡商藏经阁】', 2);
        } else { showMsg('石壁纹丝不动... (提示：选B)'); }
      }

      function checkAnswer2(result) {
        if (result === 'correct') {
          closePuzzle(2);
          startTransition('丝帛燃烧，书架缓缓移开...', 'room3.jpg', 'hotspot-2', 'hotspot-3', '你发现了深渊底部的【青铜机关室】！', 3);
        } else { showMsg('口令错误，密卷上的文字变得模糊... (提示：选B)'); }
      }

      function checkAnswer3(result) {
        if (result === 'correct') {
          closePuzzle(3);
          // 终极转场：不强行加载缺失的 room4.jpg，通过 null 参数原地保留，渲染大结局提示
          startTransition('青铜巨门缓缓开启，佛光普照...', null, 'hotspot-3', null, '震撼！你抵达了终极宝藏：【终极佛窟】！\n(演示大结局)', 4);
        } else { showMsg('齿轮发出刺耳的摩擦声... (提示：选B)'); }
      }

      // 转场状态机：更新 nextLevelNum
      function startTransition(transTextMsg, nextImageId, oldHotspotId, newHotspotId, successMsg, nextLevelNum) {
        const transScreen = document.getElementById('transition-screen');
        const transText = document.getElementById('trans-text');
        
        transText.innerText = transTextMsg; 
        transScreen.style.opacity = '1';
        transScreen.style.pointerEvents = 'auto'; 
        
        // 挂载锁定态，转移控制权
        currentLevel = -1; 

        setTimeout(() => { transText.style.opacity = '1'; }, 800);

        setTimeout(() => {
          if(nextImageId) {
             document.getElementById('main-sky').setAttribute('src', nextImageId); 
          }
          
          if(oldHotspotId) {
            let oldEl = document.getElementById(oldHotspotId);
            oldEl.setAttribute('visible', 'false');
            oldEl.setAttribute('position', '0 -1000 0'); 
            oldEl.classList.remove('interactive'); 
          }

          if(newHotspotId) {
            let newEl = document.getElementById(newHotspotId);
            newEl.setAttribute('visible', 'true');
            // 防御 Ghost Click: 等待渲染与事件流清空后，重构相交对象列表
            setTimeout(() => { 
              let clickArea = newEl.querySelector('a-circle');
              if(clickArea) {
                  clickArea.classList.remove('interactive');
                  void clickArea.offsetWidth; 
                  clickArea.classList.add('interactive'); 
              }
            }, 150);
          }
        }, 1800);

        setTimeout(() => {
          transText.style.opacity = '0';
          transScreen.style.opacity = '0';
          transScreen.style.pointerEvents = 'none'; 
          
          // 释放状态机到目标级
          currentLevel = nextLevelNum;
          
          if (currentLevel === 4) {
             document.getElementById('msg').style.background = 'rgba(212, 175, 55, 0.9)';
             document.getElementById('msg').style.color = '#000';
          }
          
          setTimeout(() => { showMsg(successMsg); }, 1500);
        }, 4000);
      }

      function showMsg(text) { 
          const box = document.getElementById('msg'); 
          box.innerText = text; 
          box.style.display = 'block'; 
          if(currentLevel !== 4) {
              setTimeout(() => { box.style.display = 'none'; }, 3500); 
          }
      }
    </script>
  </body>
</html>
