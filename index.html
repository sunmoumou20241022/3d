<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>寻宝洛阳 - 凝视彩蛋版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { font-family: '楷体', 'STKaiti', serif; margin: 0; overflow: hidden; background: #000; }
      #ui { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 10; color: #fff; text-align: center; width: 90%; pointer-events: none; }
      .msg-box { background: rgba(15, 8, 3, 0.9); padding: 15px 25px; border-radius: 8px; display: none; font-size: 20px; border: 1px solid #d4af37; box-shadow: 0 0 15px #d4af37;}
      
      .puzzle-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
      .puzzle-board { border-radius: 10px; padding: 30px; text-align: center; max-width: 85%; position: relative; }
      .puzzle-title { font-size: 26px; margin-bottom: 15px; font-weight: bold; padding-bottom: 10px; letter-spacing: 2px;}
      .poem-text { font-size: 24px; text-align: center; margin: 20px 0; letter-spacing: 2px; font-weight: bold; line-height: 1.4;}
      .poem-desc { font-size: 18px; margin-bottom: 25px; line-height: 1.5;}
      .option-btn { display: block; width: 100%; padding: 15px; font-size: 20px; font-family: '楷体'; border-radius: 5px; cursor: pointer; margin-bottom: 15px; transition: all 0.1s; }
      .option-btn:active { transform: scale(0.98); }
      .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }

      #board-1 { background: #2c1e16; border: 3px solid #d4af37; box-shadow: 0 0 50px #000; }
      #board-1 .puzzle-title, #board-1 .close-btn { color: #d4af37; border-color: #d4af37; }
      #board-1 .poem-desc { color: #eeddcc; } #board-1 .poem-text { color: #fff; }
      #board-1 .option-btn { background: linear-gradient(180deg, #4a2e1b 0%, #2a1609 100%); color: #eeddcc; border: 1px solid #d4af37; }
      #board-1 .option-btn:hover { background: #d4af37; color: #000; }

      #board-2 { background: #e8dcc7; border: 3px solid #8b4513; box-shadow: 0 0 50px rgba(139,69,19,0.5); }
      #board-2 .puzzle-title, #board-2 .close-btn { color: #8b4513; border-color: #8b4513; }
      #board-2 .poem-desc { color: #333; } #board-2 .poem-text { color: #800000; }
      #board-2 .option-btn { background: #f4ead5; color: #5c3a21; border: 1px solid #8b4513; }
      #board-2 .option-btn:hover { background: #d4af37; color: #fff; }

      #board-3 { background: #1a252c; border: 3px solid #5f9ea0; box-shadow: 0 0 50px rgba(95,158,160,0.5); }
      #board-3 .puzzle-title, #board-3 .close-btn { color: #5f9ea0; border-color: #5f9ea0; }
      #board-3 .poem-desc { color: #a0b8b8; } #board-3 .poem-text { color: #e0ffff; }
      #board-3 .option-btn { background: #2f4f4f; color: #e0ffff; border: 1px solid #5f9ea0; }
      #board-3 .option-btn:hover { background: #5f9ea0; color: #fff; }

      #transition-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; opacity: 1; pointer-events: none; transition: opacity 1.5s ease-in-out; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .transition-text { color: #d4af37; font-size: 24px; letter-spacing: 5px; opacity: 0; transition: opacity 1s ease-in-out; text-shadow: 0 0 10px #d4af37;}
      #compass { position: absolute; bottom: 30px; left: 30px; z-index: 10; color: #d4af37; font-size: 16px; width: 60px; height: 60px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
      
      #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(10, 5, 5, 0.85), rgba(5, 2, 0, 0.95)), url('room1.jpg') center/cover; display:flex; flex-direction: column; justify-content:center; align-items:center; z-index: 1001; }
      .game-title { font-size: 65px; color: #d4af37; letter-spacing: 20px; margin-bottom: 60px; font-family: '楷体', 'STKaiti', serif; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.4), 4px 4px 5px #000; }
      #start-btn { padding: 18px 50px; font-size: 26px; background: rgba(20, 10, 5, 0.6); color: #d4af37; border: 2px solid #d4af37; cursor: pointer; font-family: '楷体', 'STKaiti', serif; border-radius: 4px; transition: all 0.3s ease; animation: breatheLight 2.5s infinite alternate ease-in-out; }
      #start-btn:hover { background: rgba(212, 175, 55, 0.2); transform: scale(1.05); box-shadow: 0 0 40px rgba(212, 175, 55, 0.8); text-shadow: 0 0 10px #fff; }

      @keyframes breatheLight {
        0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2) inset, 0 0 15px rgba(212, 175, 55, 0.2); text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5) inset, 0 0 35px rgba(212, 175, 55, 0.6); text-shadow: 0 0 15px rgba(212, 175, 55, 1); }
      }

      #game-over-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
      .death-msg { color: #8b0000; font-family: '楷体', 'STKaiti', serif; text-align: center; animation: fadeBlood 4s forwards; }
      .death-main { font-size: 50px; letter-spacing: 10px; margin-bottom: 30px; text-shadow: 0 0 20px #8b0000; font-weight: bold; }
      .death-sub { font-size: 24px; color: #555; letter-spacing: 5px; }
      @keyframes fadeBlood { 0% { opacity: 0; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 1; transform: scale(1); } }

      /* ================= 秘闻彩蛋 UI ================= */
      #secret-panel { background: #222; border: 2px solid #d4af37; box-shadow: 0 0 50px rgba(212, 175, 55, 0.4); max-width: 600px; padding: 20px;}
      .secret-announcement { color: #ffeb3b; font-size: 28px; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px #ffeb3b; }
      .secret-content img { max-width: 100%; max-height: 250px; border-radius: 5px; border: 1px solid #555; margin-bottom: 15px; }
      .secret-title { color: #d4af37; font-size: 22px; margin-bottom: 10px; }
      .secret-text { color: #ccc; font-size: 18px; line-height: 1.6; text-align: left; }
      
      /* 视线加载动画器 (UI层) */
      #gaze-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; border: 4px solid transparent; border-top-color: #d4af37; border-radius: 50%; z-index: 100; display: none; }
      @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
  </head>
  <body>
    
    <div style="display: none;">
      <audio id="audio-bgm1" src="bgm1.mp3" loop preload="auto"></audio>
      <audio id="audio-bgm2" src="bgm2.mp3" loop preload="auto"></audio>
      <audio id="audio-bgm3" src="bgm3.mp3" loop preload="auto"></audio>
      <audio id="audio-ui" src="ui.mp3" preload="auto"></audio>
      <audio id="audio-door" src="door.mp3" preload="auto"></audio>
      <audio id="audio-paper" src="paper.mp3" preload="auto"></audio>
      <audio id="audio-metal" src="metal.mp3" preload="auto"></audio>
    </div>

    <div id="start-screen">
      <div class="game-title">寻宝洛阳</div>
      <button id="start-btn">触碰石门，进入地宫</button>
    </div>

    <div id="game-over-screen">
      <div class="death-msg">
        <div class="death-main">线索错误，坠入迷局</div>
        <div class="death-sub">密室机关闭合... 缺氧 Died.</div>
      </div>
    </div>

    <div id="ui"><div id="msg" class="msg-box"></div><div id="gaze-loader"></div></div>
    <div id="transition-screen"><div id="trans-text" class="transition-text"></div></div>
    <div id="compass">寻龙点穴</div>

    <!-- 题目弹窗 -->
    <div id="puzzle-1" class="puzzle-overlay"><div id="board-1" class="puzzle-board"><div class="close-btn" onclick="closePuzzle(1)">✖</div><div class="puzzle-title">龙纹石门机关</div><div class="poem-desc">暗道尽头的凹槽，须对出暗号：</div><div class="poem-text">“洛阳亲友如相问，<br>_____________。”</div><button class="option-btn" onclick="checkAnswer1('wrong')">A. 不及汪伦送我情</button><button class="option-btn" onclick="checkAnswer1('correct')">B. 一片冰心在玉壶</button><button class="option-btn" onclick="checkAnswer1('wrong')">C. 孤帆远影碧空尽</button><button class="option-btn" onclick="checkAnswer1('wrong')">D. 天涯若比邻</button></div></div>
    <div id="puzzle-2" class="puzzle-overlay"><div id="board-2" class="puzzle-board"><div class="close-btn" onclick="closePuzzle(2)">✖</div><div class="puzzle-title">西域商路密卷</div><div class="poem-desc">唯有对出口令方可开启密道：</div><div class="poem-text">“劝君更尽一杯酒，<br>西出____无故人。”</div><button class="option-btn" onclick="checkAnswer2('wrong')">A. 雁门</button><button class="option-btn" onclick="checkAnswer2('correct')">B. 阳关</button><button class="option-btn" onclick="checkAnswer2('wrong')">C. 玉门</button><button class="option-btn" onclick="checkAnswer2('wrong')">D. 楼兰</button></div></div>
    <div id="puzzle-3" class="puzzle-overlay"><div id="board-3" class="puzzle-board"><div class="close-btn" onclick="closePuzzle(3)">✖</div><div class="puzzle-title">青铜八卦锁</div><div class="poem-desc">破解天干之谜以倒转齿轮：</div><div class="poem-text">“天干地支中，‘甲’对应的五行是？”</div><button class="option-btn" onclick="checkAnswer3('wrong')">A. 金</button><button class="option-btn" onclick="checkAnswer3('correct')">B. 木</button><button class="option-btn" onclick="checkAnswer3('wrong')">C. 水</button><button class="option-btn" onclick="checkAnswer3('wrong')">D. 火</button></div></div>

    <!-- 动态秘闻彩蛋面板 -->
    <div id="secret-panel-overlay" class="puzzle-overlay">
      <div id="secret-panel" class="puzzle-board">
        <div class="close-btn" style="color:#d4af37;" onclick="closeSecret()">✖</div>
        <div class="secret-announcement">福运当头，你找到了唐朝秘闻</div>
        <div class="secret-content">
          <img id="secret-img" src="" alt="Secret Image">
          <div id="secret-title" class="secret-title"></div>
          <div id="secret-text" class="secret-text"></div>
        </div>
      </div>
    </div>

    <a-scene renderer="colorManagement: true; antialias: true;">
      <a-sky id="main-sky" src="room1.jpg" rotation="0 -90 0"></a-sky>

      <!-- 光标射线器增加 fuse 检测参数 -->
      <a-entity camera look-controls="pointerLockEnabled: false;">
        <a-cursor cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .interactive" color="#fff" radius-inner="0.01" radius-outer="0.02"></a-cursor>
      </a-entity>

      <a-light id="dynamic-light" type="point" color="#FFAA00" position="0 1 -2" intensity="0.6" animation="property: intensity; to: 0.3; dir: alternate; loop: true; dur: 800"></a-light>
      
      <!-- 天花板隐形凝视触发器 (高度 y=4)，占满头顶视野 -->
      <a-plane class="interactive" position="0 4 0" rotation="90 0 0" width="10" height="10" material="opacity: 0; transparent: true" onmouseenter="startGaze()" onmouseleave="cancelGaze()"></a-plane>

      <a-circle id="hotspot-1" class="interactive" position="-1 -0.5 -4.8" radius="1.5" opacity="0" onclick="openPuzzle(1)"></a-circle>
      
      <a-entity id="hotspot-2" position="3 0 -2" visible="false">
         <a-circle class="interactive" radius="1.5" opacity="0" onclick="openPuzzle(2)"></a-circle>
         <a-sphere radius="0.08" color="#FFD700" material="emissive: #FFD700; emissiveIntensity: 0.6" opacity="0.6" animation="property: opacity; to: 0.1; dir: alternate; loop: true; dur: 1500"></a-sphere>
      </a-entity>

      <a-entity id="hotspot-3" position="-1.5 0 -3" visible="false">
         <a-circle class="interactive" radius="1.2" opacity="0" onclick="openPuzzle(3)"></a-circle>
         <a-sphere radius="0.08" color="#005555" material="emissive: #005555; emissiveIntensity: 0.3" opacity="0.5" animation="property: opacity; to: 0.1; dir: alternate; loop: true; dur: 2000"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      let currentLevel = 1;
      let currentBgmId = null;
      let audioUnlocked = false;

      // ================= 凝视彩蛋数据与逻辑 =================
      let gazeTimer = null;
      const loaderUI = document.getElementById('gaze-loader');
      
      // ================= 扩容版历史秘闻数据字典 (200~300字) =================
      const tangSecrets = {
          1: { 
              title: "雕版印刷术的黎明与文明的火种", 
              text: "虽然这张配图展示的是十六世纪欧洲的印刷作坊，但在人类文明的浩瀚星河中，真正的印刷先驱源自东方。早在公元七世纪的初唐时期，充满智慧的中国匠人就已经发明并开始使用木板雕刻印刷术。唐代社会经济空前繁荣，文化包容并蓄，佛教的盛行更是催生了对佛经、历法以及日常文化读物的海量需求。为了摆脱传统手抄本效率低下且容易出错的弊端，雕版印刷应运而生。工匠们将文字反刻于平整的木板上，刷上徽墨，覆以宣纸，轻轻拓印，知识便如同插上翅膀般飞入寻常百姓家。这项伟大的技术创新不仅极大地降低了文化传播的成本，打破了少数贵族阶层对教育资源的长期垄断，更为后来宋代毕昇发明活字印刷术奠定了最为坚实的基础，是中华民族对世界文明进程做出的不可磨灭的伟大贡献。", 
              img: "Die_Buchdruckerei_by_Daniel_Chodowiecki_(150289207).jpg" 
          },
          2: { 
              title: "开国之君：唐高祖李渊的霸业", 
              text: "公元618年，隋朝末年天下大乱，烽烟四起，群雄割据逐鹿中原。出身于显赫关陇贵族集团的太原留守李渊，敏锐地洞察到天下大势，顺应历史潮流，在晋阳果断起兵。他率领大军南下，以摧枯拉朽之势攻入当时的政治中心长安，最终接受隋恭帝的禅让，正式登基称帝，定国号为唐。作为大唐帝国的绝对奠基人，唐高祖李渊不仅在建国初期展现了卓越非凡的军事统帅能力与战略眼光，在稳固政权后，更迅速采取了一系列休养生息的治国良策。他颁布了均田制与租庸调制，极大程度地恢复了遭到战火严重破坏的社会生产力；同时修订完善《唐律》，确立三省六部制，构建了高效的国家行政机器。这位往往被后世演义所低估的开国皇帝，成功平定了四方割据势力，为后世长达近三百年的大唐盛世筑牢了最为坚固的根基。", 
              img: "TangGaozu.jpg" 
          },
          3: { 
              title: "玄奘西行：丝绸之路上的文化苦旅", 
              text: "唐朝贞观初年，高僧玄奘深感当时国内流传的佛教经典存在诸多翻译错误、文本残缺以及教义理论上的严重分歧，为了探求佛法真理，他毅然决定只身前往佛教的发源地天竺求取真经。玄奘法师历经九死一生，孤身穿越漫漫黄沙、环境极其恶劣的塔克拉玛干沙漠，翻越冰雪覆盖、高寒缺氧的葱岭，耗时十余年，行程数万里。他不仅从遥远的异国他乡带回了六百五十七部珍贵的大乘佛教梵文经典，并在归国后于长安大雁塔设立译经场，倾注毕生心血潜心翻译。更为重要的是，他将沿途亲历的西域及中亚、南亚各国的风土人情、地理面貌、历史变迁详细口述，由弟子辩机记录编纂成《大唐西域记》。这部宏伟的巨著不仅成为了后世研究古代丝绸之路的无价之宝，更让玄奘成为了中外文化交流史上最璀璨的使者。", 
              img: "Xuanzang_w (1).jpg" 
          }
      };

      // 确保触发器中包含 encodeURI 逻辑以防止特殊字符导致 404
      function triggerSecret(level) {
          cancelGaze(); 
          playAudioSafe('audio-ui');
          const data = tangSecrets[level];
          document.getElementById('secret-title').innerText = data.title;
          document.getElementById('secret-text').innerText = data.text;
          document.getElementById('secret-img').src = encodeURI(data.img);
          document.getElementById('secret-panel-overlay').style.display = 'flex';
      }

      function startGaze() {
          // 仅在1-3关且没有打开其他面板时触发
          if (currentLevel < 1 || currentLevel > 3 || document.querySelector('.puzzle-overlay[style*="display: flex"]')) return;
          
          loaderUI.style.display = 'block';
          loaderUI.style.animation = 'spin 1s linear infinite';
          
          gazeTimer = setTimeout(() => {
              triggerSecret(currentLevel);
          }, 3000);
      }

      function cancelGaze() {
          if (gazeTimer) {
              clearTimeout(gazeTimer);
              gazeTimer = null;
          }
          loaderUI.style.display = 'none';
          loaderUI.style.animation = 'none';
      }

      function triggerSecret(level) {
          cancelGaze(); // 触发后立即取消定时器状态
          playAudioSafe('audio-ui');
          const data = tangSecrets[level];
          document.getElementById('secret-title').innerText = data.title;
          document.getElementById('secret-text').innerText = data.text;
          document.getElementById('secret-img').src = data.img;
          document.getElementById('secret-panel-overlay').style.display = 'flex';
      }

      function closeSecret() {
          playAudioSafe('audio-ui');
          document.getElementById('secret-panel-overlay').style.display = 'none';
      }

      // ================= 基础逻辑框架 =================
      function playAudioSafe(id, volume = 0.5) {
          let el = document.getElementById(id);
          if(el) {
              el.currentTime = 0; el.volume = volume;
              let p = el.play();
              if(p !== undefined) p.catch(e => console.log('Play blocked:', id, e));
          }
      }

      function switchBGM(nextBgmId) {
          if (!nextBgmId || currentBgmId === nextBgmId) return;
          let oldEl = currentBgmId ? document.getElementById(currentBgmId) : null;
          let newEl = document.getElementById(nextBgmId);
          let vol = 0.5;
          let fadeOut = setInterval(() => {
              if (vol > 0.05) { vol -= 0.05; if(oldEl) oldEl.volume = vol; } 
              else {
                  clearInterval(fadeOut);
                  if(oldEl) oldEl.pause();
                  currentBgmId = nextBgmId;
                  if(newEl) { newEl.volume = 0.5; newEl.play().catch(e=>console.log(e)); }
              }
          }, 100);
      }

      function triggerGameOver() {
          const ids = ['audio-bgm1', 'audio-bgm2', 'audio-bgm3', 'audio-ui', 'audio-door', 'audio-paper', 'audio-metal'];
          ids.forEach(id => { let el = document.getElementById(id); if(el) el.pause(); });
          document.querySelectorAll('.puzzle-overlay').forEach(el => el.style.display = 'none');
          document.getElementById('game-over-screen').style.display = 'flex';
      }

      document.getElementById('start-btn').addEventListener('click', () => {
        if (!audioUnlocked) {
            const ids = ['audio-bgm1', 'audio-bgm2', 'audio-bgm3', 'audio-ui', 'audio-paper', 'audio-metal'];
            ids.forEach(id => {
                let el = document.getElementById(id);
                if(el) { el.volume = 0; let p = el.play(); if(p !== undefined) p.then(() => { el.pause(); el.currentTime = 0; }).catch(e=>console.log(e)); }
            });
            audioUnlocked = true;
        }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('transition-screen').style.opacity = '0';
        playAudioSafe('audio-door');
        setTimeout(() => {
            currentBgmId = 'audio-bgm1';
            let bgm1 = document.getElementById('audio-bgm1');
            if(bgm1) { bgm1.volume = 0.5; bgm1.play().catch(e=>console.log(e)); }
        }, 1500);
      });

      function openPuzzle(num) { if (num !== currentLevel) return; playAudioSafe('audio-ui'); document.getElementById('puzzle-' + num).style.display = 'flex'; }
      function closePuzzle(num) { playAudioSafe('audio-ui'); document.getElementById('puzzle-' + num).style.display = 'none'; }

      function checkAnswer1(result) {
        if (result === 'correct') {
          playAudioSafe('audio-ui'); closePuzzle(1);
          startTransition('机关轰鸣，天旋地转...', 'room2.jpg', 'hotspot-1', 'hotspot-2', '轰隆隆...\n石壁裂开，你进入了【胡商藏经阁】', 2, null, null);
        } else { triggerGameOver(); }
      }

      function checkAnswer2(result) {
        if (result === 'correct') {
          playAudioSafe('audio-ui'); closePuzzle(2);
          startTransition('丝帛燃烧，书架缓缓移开...', 'room3.jpg', 'hotspot-2', 'hotspot-3', '你发现了深渊底部的【青铜机关室】！', 3, 'audio-bgm2', 'audio-paper');
        } else { triggerGameOver(); }
      }

      function checkAnswer3(result) {
        if (result === 'correct') {
          playAudioSafe('audio-ui'); closePuzzle(3);
          startTransition('青铜巨门缓缓开启，万丈佛光倾泻而出...', 'room4.jpg', 'hotspot-3', null, '震撼！你抵达了终极宝藏：【大唐龙门佛窟】！\n(演示大结局)', 4, 'audio-bgm3', 'audio-metal');
        } else { triggerGameOver(); }
      }

      function startTransition(transTextMsg, nextImageId, oldHotspotId, newHotspotId, successMsg, nextLevelNum, nextBgmTargetId, transSfxId) {
        const transScreen = document.getElementById('transition-screen');
        const transText = document.getElementById('trans-text');
        const dynLight = document.getElementById('dynamic-light');
        
        cancelGaze(); // 转场期间取消所有凝视倒计时
        
        transText.innerText = transTextMsg; 
        transScreen.style.opacity = '1';
        transScreen.style.pointerEvents = 'auto'; 
        currentLevel = -1; 
        
        if(transSfxId) playAudioSafe(transSfxId); 

        setTimeout(() => { transText.style.opacity = '1'; }, 800);

        setTimeout(() => {
          if(nextImageId) document.getElementById('main-sky').setAttribute('src', nextImageId); 
          if (nextBgmTargetId) switchBGM(nextBgmTargetId);

          if (nextLevelNum === 3) {
              dynLight.setAttribute('color', '#00FFFF');
          } else if (nextLevelNum === 4) {
              dynLight.setAttribute('visible', 'false');
          }

          if(oldHotspotId) {
            let oldEl = document.getElementById(oldHotspotId);
            oldEl.setAttribute('visible', 'false'); oldEl.setAttribute('position', '0 -1000 0'); oldEl.classList.remove('interactive'); 
          }

          if(newHotspotId) {
            let newEl = document.getElementById(newHotspotId);
            newEl.setAttribute('visible', 'true');
            setTimeout(() => { 
              let clickArea = newEl.querySelector('a-circle');
              if(clickArea) { clickArea.classList.remove('interactive'); void clickArea.offsetWidth; clickArea.classList.add('interactive'); }
            }, 150);
          }
        }, 1800);

        setTimeout(() => {
          transText.style.opacity = '0';
          transScreen.style.opacity = '0';
          transScreen.style.pointerEvents = 'none'; 
          
          currentLevel = nextLevelNum;
          if (currentLevel === 4) {
             document.getElementById('msg').style.background = 'rgba(212, 175, 55, 0.9)';
             document.getElementById('msg').style.color = '#000';
          }
          setTimeout(() => { showMsg(successMsg); }, 1500);
        }, 4000);
      }

      function showMsg(text) { 
          const box = document.getElementById('msg'); box.innerText = text; box.style.display = 'block'; 
          if(currentLevel !== 4) setTimeout(() => { box.style.display = 'none'; }, 3500); 
      }
    </script>
  </body>
</html>
