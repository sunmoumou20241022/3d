<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>寻宝洛阳 - 连环密室：大升级稳定版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      #ui { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 10; color: #fff; text-align: center; font-family: '楷体', sans-serif; pointer-events: none; width: 85%;}
      .msg-box { background: rgba(15, 8, 3, 0.9); padding: 25px; border-radius: 10px; display: none; pointer-events: auto; font-size: 24px; border: 2px solid #d4af37; box-shadow: 0 0 20px #d4af37; text-shadow: 1px 1px 2px black; line-height: 1.5;}
      #inventory { position: absolute; bottom: 20px; left: 20px; z-index: 10; color: #d4af37; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 12px; border: 1px solid #d4af37; border-radius: 6px;}
    </style>
  </head>
  <body>
    <div id="ui"><div id="msg" class="msg-box"></div></div>
    <div id="inventory">背包：空空如也</div>

    <a-scene>
      <a-sky id="main-sky" src="room1.jpg" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls>
        <a-cursor fuse="true" fuse-timeout="1500" raycaster="objects: .interactive" color="#d4af37"></a-cursor>
      </a-entity>
      
      <a-image id="jade" class="interactive" src="tablet.png" crossOrigin="anonymous" 
               position="2.5 -1.2 -3.5" rotation="-15 45 0" scale="0.8 0.8 0.8"
               animation="property: scale; dir: alternate; dur: 1200; to: 0.9 0.9 0.9; loop: true"
               animation__rotation="property: rotation; to: -15 405 0; dur: 10000; loop: true; easing: linear"
               onclick="collectJade()"></a-image>

      <a-torus id="shrine" class="interactive" position="-1 0.2 -4.8" radius="0.25" radius-tubular="0.03" color="#8b4513" opacity="0.8"
               animation="property: rotation; to: 360 360 0; dur: 5000; loop: true; easing: linear"
                   onclick="tryPlaceJade()"></a-torus>

      <a-circle id="door" position="-1 -0.5 -4.8" radius="0.5" color="#00FFFF" opacity="0.01" rotation="-90 0 0" visible="false"></a-circle>

    </a-scene>

    <script>
      let hasJade = false; let isShrineActivated = false;
      function collectJade() {
        if(!hasJade) {
          hasJade = true; document.querySelector('#jade').setAttribute('visible', 'false'); document.querySelector('#jade').classList.remove('interactive');
          showMsg('获得线索：【透雕龙纹玉牌】！\n似乎可以和那个神秘神龛匹配。');
          document.querySelector('#inventory').innerText = '背包：【透雕龙纹玉牌】';
          document.querySelector('#shrine').setAttribute('color', '#FFD700');
        }
      }
      function tryPlaceJade() {
        if(isShrineActivated) return;
        if(hasJade) {
          isShrineActivated = true; document.querySelector('#shrine').setAttribute('material', 'emissive', '#FFD700');
          document.querySelector('#inventory').innerText = '背包：空空如也';
          showMsg('咔哒...\n玉牌严丝合缝嵌入凹槽，石壁震动，传送法阵显现！');
          const door = document.querySelector('#door'); door.setAttribute('visible', 'true'); door.setAttribute('opacity', '0.6'); door.classList.add('interactive'); door.setAttribute('onclick', "teleportToRoom2()");
        } else { showMsg('神龛凹槽深不见底，似乎在等待某种特定图案的玉器...'); }
      }
      function teleportToRoom2() { document.querySelector('#main-sky').setAttribute('src', 'room2.jpg'); document.querySelector('#shrine').setAttribute('visible', 'false'); document.querySelector('#door').setAttribute('visible', 'false'); showMsg('进入了【胡商藏经阁】'); }
      function showMsg(text) { const box = document.querySelector('#msg'); box.innerText = text; box.style.display = 'block'; setTimeout(() => { box.style.display = 'none'; }, 4500); }
    </script>
  </body>
</html>
