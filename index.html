<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>寻宝洛阳 - 沉浸式 3D 空间重制版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { font-family: '楷体', 'STKaiti', serif; margin: 0; overflow: hidden; background: #000; touch-action: none; }
      #ui { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 10; color: #fff; text-align: center; width: 90%; pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 15px;}
      
      /* 优化提示框，增加毛玻璃效果 */
      .msg-box { background: rgba(15, 8, 3, 0.85); backdrop-filter: blur(5px); padding: 15px 30px; border-radius: 8px; display: none; font-size: 20px; border: 1px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); letter-spacing: 2px;}
      
      /* 环境叙事（彩蛋）专属 UI */
      .lore-box { background: rgba(10, 20, 30, 0.85); backdrop-filter: blur(5px); padding: 15px 30px; border-radius: 8px; display: none; font-size: 18px; color: #a0c0d0; border: 1px solid #5f9ea0; box-shadow: 0 0 20px rgba(95, 158, 160, 0.5); font-style: italic; max-width: 600px;}
      .lore-title { color: #5f9ea0; font-weight: bold; font-size: 20px; margin-bottom: 8px; font-style: normal;}

      .puzzle-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
      .puzzle-board { border-radius: 10px; padding: 25px; text-align: center; width: 85%; max-width: 650px; position: relative; box-sizing: border-box; }
      .option-btn { display: block; width: 100%; padding: 12px; font-size: 18px; font-family: '楷体'; border-radius: 5px; cursor: pointer; margin-bottom: 12px; transition: all 0.1s; box-sizing: border-box; pointer-events: auto;}
      .option-btn:active { transform: scale(0.98); }

      #transition-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; opacity: 1; pointer-events: none; transition: opacity 1.5s ease-in-out; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .transition-text { color: #d4af37; font-size: 20px; letter-spacing: 3px; opacity: 0; transition: opacity 1s ease-in-out; text-shadow: 0 0 10px #d4af37; text-align: center; padding: 0 20px;}
      #compass { position: absolute; bottom: 30px; left: 20px; z-index: 10; color: #d4af37; font-size: 14px; width: 50px; height: 50px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
      
      #fs-btn { position: absolute; bottom: 20px; right: 20px; z-index: 9999; cursor: pointer; background: rgba(0,0,0,0.5); border: 2px solid #d4af37; border-radius: 8px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; transition: all 0.2s ease;}
      #fs-btn:hover { background: rgba(212, 175, 55, 0.3); transform: scale(1.1); }
      #fs-btn svg { width: 24px; height: 24px; stroke: #d4af37; stroke-width: 2; fill: none; }

      #start-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(rgba(10, 5, 5, 0.85), rgba(5, 2, 0, 0.95)), url('room1.jpg') center/cover; display:flex; flex-direction: column; justify-content:center; align-items:center; z-index: 1001; }
      .game-title { font-size: 45px; color: #d4af37; letter-spacing: 15px; margin-bottom: 50px; font-family: '楷体', 'STKaiti', serif; text-shadow: 0 0 15px rgba(212, 175, 55, 0.6), 0 0 30px rgba(212, 175, 55, 0.4), 4px 4px 5px #000; }
      
      #start-btn { padding: 15px 40px; font-size: 22px; background: rgba(20, 10, 5, 0.6); color: #d4af37; border: 2px solid #d4af37; cursor: pointer; font-family: '楷体', 'STKaiti', serif; border-radius: 4px; transition: all 0.3s ease; animation: breatheLight 2.5s infinite alternate ease-in-out; pointer-events: auto;}
      #start-btn:active { background: rgba(212, 175, 55, 0.4); transform: scale(0.95); }

      @keyframes breatheLight {
        0% { box-shadow: 0 0 10px rgba(212, 175, 55, 0.2) inset, 0 0 15px rgba(212, 175, 55, 0.2); text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5) inset, 0 0 35px rgba(212, 175, 55, 0.6); text-shadow: 0 0 15px rgba(212, 175, 55, 1); }
      }

      /* 通关白屏特效预设 */
      #supernova-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFF; z-index: 998; opacity: 0; pointer-events: none; transition: opacity 2s ease-in; }
    </style>
  </head>
  <body>

    <div id="fs-btn" onclick="toggleFullScreen()">
      <svg viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
      </svg>
    </div>

    <div id="start-screen">
      <div class="game-title">寻宝洛阳</div>
      <button id="start-btn" onclick="initGame(event)">触碰石门，进入地宫</button>
    </div>
    
    <div id="supernova-screen"></div>

    <div id="finale-screen" class="puzzle-overlay" style="background: rgba(10, 5, 0, 0.9);">
      <div class="puzzle-board" style="background: transparent; border: none; box-shadow: none; width: 95%; max-width: 800px;">
        <div style="color: #FFD700; text-shadow: 0 0 30px #FFD700, 0 0 10px #FFF; font-size: 35px; letter-spacing: 5px; margin-bottom: 20px; font-weight: bold;">寻宝圆满，名留青史</div>
        <div style="color: #EEDDCC; font-size: 16px; line-height: 1.6; margin-bottom: 30px;">
          你成功破解了所有机关，唤醒了沉睡的洛阳记忆。<br>
          大唐的辉煌与西域的驼铃，都已刻入你的灵魂。<br>
          <span style="color: #FFD700; font-weight: bold;">【终极奖励解锁：洛阳风物图鉴与荣誉守陵人称号】</span>
        </div>
        <div style="display: flex; justify-content: center; gap: 15px; flex-direction: row; flex-wrap: wrap;">
          <button class="option-btn" style="background: #d4af37; color: #000; border: 2px solid #FFF; font-weight: bold; width: 45%; margin: 0;" onclick="restartGame()">再入轮回</button>
          <button class="option-btn" style="background: rgba(40, 20, 10, 0.8); color: #d4af37; border: 2px solid #d4af37; font-weight: bold; width: 45%; margin: 0;" onclick="stayInRoom()">驻留此地</button>
        </div>
      </div>
    </div>

    <div id="ui">
        <div id="msg" class="msg-box"></div>
        <div id="lore" class="lore-box"></div>
    </div>
    <div id="transition-screen"><div id="trans-text" class="transition-text"></div></div>
    <div id="compass">寻龙点穴</div>

    <a-scene vr-mode-ui="enabled: false" renderer="colorManagement: true; antialias: true;">
      <a-assets>
        <img id="img-room1" src="room1.jpg">
        <img id="img-room2" src="room2.jpg">
        <img id="img-room3" src="room3.jpg">
        <img id="img-room4" src="room4.jpg">
        <audio id="audio-bgm1" src="bgm1.mp3" loop preload="auto"></audio>
        <audio id="audio-bgm2" src="bgm2.mp3" loop preload="auto"></audio>
        <audio id="audio-bgm3" src="bgm3.mp3" loop preload="auto"></audio>
        <audio id="audio-ui" src="ui.mp3" preload="auto"></audio>
        <audio id="audio-door" src="door.mp3" preload="auto"></audio>
        <audio id="audio-paper" src="paper.mp3" preload="auto"></audio>
        <audio id="audio-metal" src="metal.mp3" preload="auto"></audio>
      </a-assets>

      <a-sky id="main-sky" src="#img-room1" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls="pointerLockEnabled: true;" position="0 1.6 0">
        <a-cursor color="#d4af37" radius-inner="0.01" radius-outer="0.02" raycaster="objects: .interactive"
          animation__scale_enter="property: scale; to: 1.8 1.8 1.8; startEvents: mouseenter; dur: 150"
          animation__scale_leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 150">
        </a-cursor>
      </a-entity>

      <a-light id="dynamic-light" type="point" color="#FFAA00" position="0 1 -2" intensity="0.6" animation="property: intensity; to: 0.3; dir: alternate; loop: true; dur: 800"></a-light>
      
      <a-entity id="dust-particles" visible="false">
         <a-sphere radius="0.005" color="#FFF" opacity="0.15" position="-1.5 1 -2" animation__pos="property: position; to: -1 2.5 -1.5; dir: alternate; loop: true; dur: 12000; easing: linear"></a-sphere>
         <a-sphere radius="0.008" color="#EEDDCC" opacity="0.1" position="1.5 1.5 -2.5" animation__pos="property: position; to: 0.5 1.8 -2; dir: alternate; loop: true; dur: 15000; easing: easeInOutSine"></a-sphere>
         <a-sphere radius="0.006" color="#FFF" opacity="0.12" position="0 0.8 -3.5" animation__pos="property: position; to: 0.2 2 -3; dir: alternate; loop: true; dur: 18000; easing: linear"></a-sphere>
         <a-sphere radius="0.01" color="#FFD700" opacity="0.08" position="0 1.2 -1.5" animation__pos="property: position; to: 0 1.5 -1.5; dir: alternate; loop: true; dur: 8000; easing: easeInOutSine"></a-sphere>
      </a-entity>

      <a-entity id="level-1-entities">
        <a-circle id="hotspot-1" class="interactive" position="-1 -0.5 -4.8" radius="1.5" opacity="0" onclick="hitDoor(1)"></a-circle>
        <a-torus id="key-1" class="interactive" position="3 -1 2" rotation="0 45 0" radius="0.15" radius-tubular="0.03" color="#3CB371" material="emissive: #3CB371; emissiveIntensity: 0.5" animation="property: rotation; to: 0 405 0; loop: true; dur: 4000; easing: linear" onclick="hitKey(1)"></a-torus>
        <a-octahedron class="interactive" position="-2 -1.5 3" radius="0.08" color="#5f9ea0" material="emissive: #5f9ea0; emissiveIntensity: 0.8" animation="property: position; to: -2 -1.4 3; dir: alternate; loop: true; dur: 2000" onclick="showLore('摸金绝笔', '这地宫根本不是宝库，而是个吞噬活人的陷阱！老王刚刚还在我身后，一转眼就没影了...')"></a-octahedron>
      </a-entity>

      <a-entity id="level-2-entities" visible="false">
         <a-circle id="hotspot-2" radius="1.5" position="3 0 -2" opacity="0" onclick="hitDoor(2)"></a-circle>
         <a-cylinder id="key-2" position="-2 0 3" rotation="30 45 10" radius="0.05" height="0.4" color="#d4af37" material="emissive: #d4af37; emissiveIntensity: 0.4" animation="property: position; to: -2 0.2 3; dir: alternate; loop: true; dur: 1500" onclick="hitKey(2)"></a-cylinder>
         <a-octahedron class="interactive" position="1 -1 -3" radius="0.08" color="#5f9ea0" material="emissive: #5f9ea0; emissiveIntensity: 0.8" animation="property: position; to: 1 -0.9 -3; dir: alternate; loop: true; dur: 2000" onclick="showLore('西域商贾的羊皮纸', '丝绸之路的尽头，不仅有黄金，还有无尽的杀戮。那帮马贼离我不远了，愿佛祖保佑。')"></a-octahedron>
      </a-entity>

      <a-entity id="level-3-entities" visible="false">
         <a-circle id="hotspot-3" radius="1.2" position="-1.5 0 -3" opacity="0" onclick="hitDoor(3)"></a-circle>
         <a-dodecahedron id="key-3" position="2 1.5 2" radius="0.15" color="#FF4500" material="emissive: #FF4500; emissiveIntensity: 0.6" animation="property: rotation; to: 360 360 0; loop: true; dur: 5000; easing: linear" onclick="hitKey(3)"></a-dodecahedron>
      </a-entity>

      <a-entity id="hotspot-finale" position="0 0 -5" visible="false">
         <a-circle radius="3" opacity="0" onclick="triggerFinale()"></a-circle>
      </a-entity>

    </a-scene>

    <script>
      let currentLevel = 1;
      let currentBgmId = null;
      let loreTimer = null;

      function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`全屏被拦截: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
      }

      function forceExitPointerLock() {
          document.exitPointerLock = document.exitPointerLock || document.mozExitPointerLock || document.webkitExitPointerLock;
          if (document.exitPointerLock) { document.exitPointerLock(); }
      }

      function playAudioSafe(id, volume = 0.5) {
          let el = document.getElementById(id);
          if(el) { el.currentTime = 0; el.volume = volume; let p = el.play(); if(p !== undefined) p.catch(e => console.warn('Audio blocked:', e)); }
      }

      function switchBGM(nextBgmId) {
          if (!nextBgmId || currentBgmId === nextBgmId) return;
          let oldEl = currentBgmId ? document.getElementById(currentBgmId) : null;
          let newEl = document.getElementById(nextBgmId);
          let vol = 0.5;
          let fadeOut = setInterval(() => {
              if (vol > 0.05) { vol -= 0.05; if(oldEl) oldEl.volume = vol; } 
              else {
                  clearInterval(fadeOut); if(oldEl) oldEl.pause(); currentBgmId = nextBgmId;
                  if(newEl) { newEl.volume = 0.5; newEl.play().catch(e=>{}); }
              }
          }, 100);
      }

      function showMsg(text) { 
          const box = document.getElementById('msg'); box.innerText = text; box.style.display = 'block'; 
          if(currentLevel !== 4) setTimeout(() => { box.style.display = 'none'; }, 3500); 
      }

      // 彩蛋环境叙事 UI 逻辑
      function showLore(title, text) {
          playAudioSafe('audio-ui');
          const box = document.getElementById('lore');
          box.innerHTML = `<div class="lore-title">【${title}】</div><div>${text}</div>`;
          box.style.display = 'block';
          if(loreTimer) clearTimeout(loreTimer);
          loreTimer = setTimeout(() => { box.style.display = 'none'; }, 5000); // 5秒后自动消失，不打断沉浸感
      }

      function initGame(e) {
          document.getElementById('start-screen').style.display = 'none';
          document.getElementById('transition-screen').style.opacity = '0';
          playAudioSafe('audio-door', 0.8);
          setTimeout(() => { 
              currentBgmId = 'audio-bgm1'; 
              let bgm1 = document.getElementById('audio-bgm1'); 
              if(bgm1) { bgm1.volume = 0.5; bgm1.play().catch(e=>{}); } 
          }, 2000);
      }

      // 玩家点击石门的逻辑
      function hitDoor(level) {
          if (level !== currentLevel) return;
          playAudioSafe('audio-ui');
          if (level === 1) showMsg("石门死死锁住。角落里似乎有绿色的光芒闪烁...");
          if (level === 2) showMsg("密道被封印。必须找到失落的【西域通关密卷】才能放行！");
          if (level === 3) showMsg("青铜齿轮卡死！四周漂浮的红色阵核是关键...");
      }

      // 玩家找到并点击隐藏钥匙的逻辑
      function hitKey(level) {
          if (level !== currentLevel) return;
          playAudioSafe('audio-ui');
          document.getElementById('key-' + level).setAttribute('visible', 'false'); // 拿到钥匙后消失
          
          if (level === 1) {
              startTransition('拾得【龙纹玉佩】！石门轰然洞开...', '#img-room2', 1, 2, '你进入了【胡商藏经阁】\n寻找下一把密卷钥匙', null, 'audio-door');
          } else if (level === 2) {
              startTransition('寻回【通关密卷】！书架缓缓移开...', '#img-room3', 2, 3, '你进入了【青铜机关室】\n寻找最后一个阵核', 'audio-bgm2', 'audio-paper');
          } else if (level === 3) {
              startTransition('阵核归位！万丈佛光倾泻而出...', '#img-room4', 3, 4, '震撼！注视大佛，迎接你的宿命！', 'audio-bgm3', 'audio-metal');
          }
      }

      function startTransition(transTextMsg, nextImageId, oldLevelNum, newLevelNum, successMsg, nextBgmTargetId, transSfxId) {
        const transScreen = document.getElementById('transition-screen');
        const transText = document.getElementById('trans-text');
        const dynLight = document.getElementById('dynamic-light');
        const dustFx = document.getElementById('dust-particles');
        
        transText.innerText = transTextMsg; 
        transScreen.style.opacity = '1';
        transScreen.style.pointerEvents = 'auto'; 
        currentLevel = -1; // 锁定状态机
        
        if(transSfxId) playAudioSafe(transSfxId, 0.8); 

        setTimeout(() => { transText.style.opacity = '1'; }, 800);

        setTimeout(() => {
          if(nextImageId) document.getElementById('main-sky').setAttribute('src', nextImageId); 
          if (nextBgmTargetId) switchBGM(nextBgmTargetId);

          // 权限转移：剥夺旧房间交互权，赋予新房间交互权
          if (oldLevelNum) {
              let oldGroup = document.getElementById(`level-${oldLevelNum}-entities`);
              if (oldGroup) {
                  oldGroup.setAttribute('visible', 'false');
                  Array.from(oldGroup.querySelectorAll('.interactive')).forEach(el => el.classList.remove('interactive'));
              }
          }

          if (newLevelNum && newLevelNum <= 3) {
              let newGroup = document.getElementById(`level-${newLevelNum}-entities`);
              if (newGroup) {
                  newGroup.setAttribute('visible', 'true');
                  // 重新激活新区域的所有交互元素
                  let keys = ['hotspot', 'key'];
                  keys.forEach(k => {
                      let el = document.getElementById(`${k}-${newLevelNum}`);
                      if(el) el.classList.add('interactive');
                  });
                  // 激活当前区域的彩蛋
                  Array.from(newGroup.querySelectorAll('a-octahedron')).forEach(el => el.classList.add('interactive'));
              }
          }

          if (newLevelNum === 3) {
              dynLight.setAttribute('color', '#00FFFF');
          } else if (newLevelNum === 4) {
              dynLight.setAttribute('color', '#FFD700');
              dustFx.setAttribute('visible', 'true');
              
              let finaleHotspot = document.getElementById('hotspot-finale');
              finaleHotspot.setAttribute('visible', 'true');
              setTimeout(() => { 
                  let clickArea = finaleHotspot.querySelector('a-circle');
                  if(clickArea) clickArea.classList.add('interactive'); 
              }, 150);
          }

        }, 1800);

        setTimeout(() => {
          transText.style.opacity = '0';
          transScreen.style.opacity = '0';
          transScreen.style.pointerEvents = 'none'; 
          
          currentLevel = newLevelNum;
          if (currentLevel === 4) {
             document.getElementById('msg').style.background = 'rgba(212, 175, 55, 0.9)';
             document.getElementById('msg').style.color = '#000';
          }
          setTimeout(() => { showMsg(successMsg); }, 1500);
        }, 4000);
      }

      // === 【特性升级 3】：结局视觉奇观 ===
      function triggerFinale() {
          if (currentLevel !== 4) return; // 防护死锁
          currentLevel = -1; // 锁定状态，防止重复点击
          
          document.getElementById('msg').style.display = 'none';
          
          // 播放神圣重低音
          playAudioSafe('audio-metal', 1.0);
          setTimeout(() => playAudioSafe('audio-door', 1.0), 500);

          // 1. 光爆效果
          let light = document.getElementById('dynamic-light');
          light.removeAttribute('animation');
          light.setAttribute('color', '#FFFFFF');
          light.setAttribute('animation__burst', 'property: intensity; from: 0.6; to: 15; dur: 2500; easing: easeInExpo');

          // 2. 粒子加速狂暴
          let spheres = document.getElementById('dust-particles').querySelectorAll('a-sphere');
          spheres.forEach(s => {
              s.setAttribute('color', '#FFFFFF');
              s.setAttribute('animation__pos', 'dur: 800'); // 加速乱飞
          });

          // 3. 屏幕白化
          setTimeout(() => {
              document.getElementById('supernova-screen').style.opacity = '1';
          }, 1500);

          // 4. 彻底平静，弹出大结局 UI
          setTimeout(() => {
              document.getElementById('finale-screen').style.display = 'flex';
              forceExitPointerLock();
          }, 3500);
      }

      function stayInRoom() {
          playAudioSafe('audio-ui');
          document.getElementById('finale-screen').style.display = 'none';
          document.getElementById('supernova-screen').style.opacity = '0';
      }

      function restartGame() {
          // 刷新页面是最彻底的重置方案，清除所有引擎缓存
          window.location.reload();
      }

    </script>
  </body>
</html>
