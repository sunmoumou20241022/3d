<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>寻宝洛阳 - 双关卡连环版</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { font-family: '楷体', 'STKaiti', serif; margin: 0; overflow: hidden; }
      
      /* 顶部提示框 */
      #ui { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 10; color: #fff; text-align: center; width: 90%; pointer-events: none; }
      .msg-box { background: rgba(15, 8, 3, 0.9); padding: 15px 25px; border-radius: 8px; display: none; font-size: 20px; border: 1px solid #d4af37; box-shadow: 0 0 15px #d4af37;}
      
      /* ================= 解谜面板通用样式 ================= */
      .puzzle-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); z-index: 999; 
        flex-direction: column; align-items: center; justify-content: center;
      }
      
      /* 第一关：暗黑色调石门面板 */
      #board-1 { background: #2c1e16; border: 3px solid #d4af37; box-shadow: 0 0 50px #000; }
      
      /* 第二关：丝帛/羊皮纸色调面板 */
      #board-2 { background: #e8dcc7; border: 3px solid #8b4513; box-shadow: 0 0 50px rgba(139,69,19,0.5); }
      #board-2 .puzzle-title { color: #8b4513; border-bottom: 2px solid #8b4513; }
      #board-2 .poem-desc { color: #333; font-weight: bold; }
      #board-2 .poem-text { color: #800000; }
      #board-2 .option-btn { background: #f4ead5; color: #5c3a21; border: 1px solid #8b4513; font-weight: bold; }
      #board-2 .option-btn:hover { background: #d4af37; color: #fff; }
      #board-2 .close-btn { color: #8b4513; }

      .puzzle-board { border-radius: 10px; padding: 30px; text-align: center; max-width: 85%; position: relative; }
      .puzzle-title { color: #d4af37; font-size: 26px; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #d4af37; padding-bottom: 10px; letter-spacing: 2px;}
      .poem-text { font-size: 24px; color: #fff; text-align: center; margin: 20px 0; letter-spacing: 2px; font-weight: bold; line-height: 1.4;}
      .poem-desc { color: #eeddcc; font-size: 18px; margin-bottom: 25px; line-height: 1.5;}

      .option-btn {
        display: block; width: 100%; background: linear-gradient(180deg, #4a2e1b 0%, #2a1609 100%);
        border: 1px solid #d4af37; color: #eeddcc; padding: 15px; font-size: 20px; font-family: '楷体';
        border-radius: 5px; cursor: pointer; margin-bottom: 15px; transition: all 0.1s;
      }
      .option-btn:active { transform: scale(0.98); }
      .close-btn { position: absolute; top: 10px; right: 15px; color: #d4af37; font-size: 24px; cursor: pointer; }

      /* ================= 电影级转场 ================= */
      #transition-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000;
        opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .transition-text { color: #d4af37; font-size: 24px; letter-spacing: 5px; opacity: 0; transition: opacity 1s ease-in-out; text-shadow: 0 0 10px #d4af37;}
      #compass { position: absolute; bottom: 30px; left: 30px; z-index: 10; color: #d4af37; font-size: 16px; width: 60px; height: 60px; border: 1px solid #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); }
    </style>
  </head>
  <body>
    
    <div id="ui"><div id="msg" class="msg-box"></div></div>
    <div id="transition-screen"><div id="trans-text" class="transition-text"></div></div>
    <div id="compass">寻龙点穴</div>

    <div id="puzzle-1" class="puzzle-overlay">
      <div id="board-1" class="puzzle-board">
        <div class="close-btn" onclick="closePuzzle(1)">✖</div>
        <div class="puzzle-title">龙纹石门机关</div>
        <div class="poem-desc">你在暗道尽头的石壁上发现了一个凹槽，须对出暗号：</div>
        <div class="poem-text">“洛阳亲友如相问，<br>_____________。”</div>
        <button class="option-btn" onclick="checkAnswer1('wrong')">A. 不及汪伦送我情</button>
        <button class="option-btn" onclick="checkAnswer1('correct')">B. 一片冰心在玉壶</button>
      </div>
    </div>

    <div id="puzzle-2" class="puzzle-overlay">
      <div id="board-2" class="puzzle-board">
        <div class="close-btn" onclick="closePuzzle(2)">✖</div>
        <div class="puzzle-title">西域商路密卷</div>
        <div class="poem-desc">你在书架深处翻出一卷发黄的丝帛，上面写着大唐西域商会的机密口令。只有对出口令，才能打开书架后的密道：</div>
        <div class="poem-text">“劝君更尽一杯酒，<br>西出____无故人。”</div>
        <button class="option-btn" onclick="checkAnswer2('wrong')">A. 雁门</button>
        <button class="option-btn" onclick="checkAnswer2('correct')">B. 阳关</button>
        <button class="option-btn" onclick="checkAnswer2('wrong')">C. 玉门</button>
      </div>
    </div>

    <a-scene renderer="colorManagement: true; antialias: true;">
      <a-sky id="main-sky" src="room1.jpg" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls="pointerLockEnabled: false;">
        <a-cursor cursor="rayOrigin: mouse" raycaster="objects: .interactive" color="#fff" radius-inner="0.01" radius-outer="0.02"></a-cursor>
      </a-entity>
      
      <a-circle id="hotspot-1" class="interactive" position="-1 -0.5 -4.8" radius="1.5" opacity="0" onclick="openPuzzle(1)"></a-circle>

      <a-entity id="hotspot-2" position="3 0 -2" visible="false">
         <a-circle class="interactive" radius="1.5" opacity="0" onclick="openPuzzle(2)"></a-circle>
         <a-ring radius-inner="0.3" radius-outer="0.35" color="#FFD700" opacity="0.3" animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 2000"></a-ring>
      </a-entity>

    </a-scene>

    <script>
      // UI 开关控制
      function openPuzzle(num) { document.getElementById('puzzle-' + num).style.display = 'flex'; }
      function closePuzzle(num) { document.getElementById('puzzle-' + num).style.display = 'none'; }

      // ================= 第一关逻辑 =================
      function checkAnswer1(result) {
        if (result === 'correct') {
          closePuzzle(1);
          // 转场参数：文案, 目标图片, 隐藏旧热区, 显示新热区, 成功提示
          startTransition('机关轰鸣，天旋地转...', 'room2.jpg', 'hotspot-1', 'hotspot-2', '轰隆隆...\n石壁裂开，你进入了【胡商藏经阁】');
        } else { showMsg('石壁纹丝不动... (提示：选B)'); }
      }

      // ================= 第二关逻辑 =================
      function checkAnswer2(result) {
        if (result === 'correct') {
          closePuzzle(2);
          // 转场到第三关 (青铜机关室)
          startTransition('丝帛燃烧，书架缓缓移开...', 'room3.jpg', 'hotspot-2', null, '你发现了深渊底部的【青铜机关室】！');
        } else { showMsg('口令错误，密卷上的文字变得模糊... (提示：选B)'); }
      }

      // ================= 核心封装：通用电影级转场 =================
      function startTransition(transTextMsg, nextImageId, oldHotspotId, newHotspotId, successMsg) {
        const transScreen = document.getElementById('transition-screen');
        const transText = document.getElementById('trans-text');
        
        transText.innerText = transTextMsg; // 设置转场文字
        transScreen.style.opacity = '1';
        transScreen.style.pointerEvents = 'auto'; 
        
        setTimeout(() => { transText.style.opacity = '1'; }, 800);

        setTimeout(() => {
          document.getElementById('main-sky').setAttribute('src', nextImageId); // 切换背景
          
          // 关掉旧热区
          if(oldHotspotId) {
            document.getElementById(oldHotspotId).setAttribute('visible', 'false');
            document.getElementById(oldHotspotId).querySelector('.interactive').classList.remove('interactive');
          }
          // 激活新热区
          if(newHotspotId) {
            document.getElementById(newHotspotId).setAttribute('visible', 'true');
            // 注意：A-Frame 元素显示后，需要稍微延迟确保类名生效
            setTimeout(() => { document.getElementById(newHotspotId).querySelector('a-circle').classList.add('interactive'); }, 100);
          }
        }, 1800);

        setTimeout(() => {
          transText.style.opacity = '0';
          transScreen.style.opacity = '0';
          transScreen.style.pointerEvents = 'none'; 
          setTimeout(() => { showMsg(successMsg); }, 1500);
        }, 4000);
      }

      function showMsg(text) { const box = document.getElementById('msg'); box.innerText = text; box.style.display = 'block'; setTimeout(() => { box.style.display = 'none'; }, 3500); }
    </script>
  </body>
</html>
